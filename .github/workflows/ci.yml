name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same branch/PR when new commits land.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: ci (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel macOS just because Linux failed — they can fail for
      # different reasons (native @resvg/resvg-js has per-OS prebuilds).
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # pnpm/action-setup picks up the version pinned in package.json (packageManager).
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      # We install + build under Node 22 (pnpm 10.28+ uses node:sqlite which
      # needs ≥ 22.13). The published bundle still targets node20 (see
      # tsdown.config.ts) and engines.node stays at >=20.19.4 — that's the
      # runtime floor users get. The smoke step at the end swaps to Node
      # 20.19.4 so we actually verify the engines claim instead of trusting it.
      - name: Setup Node 22 (toolchain)
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: pnpm lint

      - name: Typecheck (tsc)
        run: pnpm typecheck

      - name: Test (vitest)
        run: pnpm test

      - name: Build (tsdown)
        run: pnpm build

      - name: Setup Node 20.19.4 (engines.node floor)
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.4

      # Verifies the bundle actually runs end-to-end on the declared engines
      # floor: bin shebang, ESM resolution, font loading, and the
      # @resvg/resvg-js native module. `doctor` is the canonical health check.
      - name: Smoke test built CLI on Node 20
        run: |
          node --version
          node dist/cli.mjs --version
          node dist/cli.mjs --help
          node dist/cli.mjs doctor
